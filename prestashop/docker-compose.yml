name: prestashop
services:
  mysql:
    container_name: prestashop-sql
    image: mysql:5.7
    restart: unless-stopped
    ports:
      - 27306:3306
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: prestashop
      MYSQL_USER: prestashop
      MYSQL_PASSWORD: azer
    networks:
      - prestashop_network
    volumes:
      - mysql_data:/var/lib/mysql
  prestashop:
    container_name: prestashop-web
    image: prestashop/prestashop:latest
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - 8080:80
    environment:
      DB_SERVER: prestashop-mysql
      DB_NAME: prestashop
      DB_USER: prestashop
      DB_PASSWD: azer
    networks:
      - prestashop_network
    volumes:
      - ./app:/var/www/html
networks:
    prestashop_network:
volumes:
    mysql_data: {}
