api_platform:
    title: 2503 Super API
    version: 1.0.0
    show_webby: false
    formats: 
        json: ['application/json']
        xml: ['application/xml', 'text/xml']
        jsonld: ['application/ld+json']
        csv: ['text/csv']
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
    
